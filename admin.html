<!DOCTYPE html>
<html lang="pt">
  <head>
      <meta charset="UTF-8"/>
      <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
      <title>Admin – Proliga</title>
    <meta name="robots" content="noindex, nofollow"/>
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png"/>
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png"/>
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png"/>
  <link rel="shortcut icon" href="/favicon.ico"/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
    <style>
          *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
          :root{--blue:#1E4FD6;--blue-dark:#1740B0;--blue-light:#EEF2FC;--gold:#B4650A;--green:#1B8A4B;--red:#C0362C;--text:#14181F;--muted:#5B6270;--border:#ECECE9;--bg:#F7F8FA;--white:#fff}
          body{font-family:'Inter',sans-serif;color:var(--text);background:var(--bg);min-height:100vh}
          a{text-decoration:none;color:inherit}

          /* LOGIN */
          #login-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px}
          .login-box{background:var(--white);border-radius:20px;padding:40px;width:100%;max-width:400px;box-shadow:0 8px 40px rgba(0,0,0,.1);border:1px solid var(--border)}
          .login-logo{font-size:28px;font-weight:900;color:var(--blue);letter-spacing:-1px;margin-bottom:6px}.login-logo span{color:var(--gold)}
          .login-sub{font-size:13px;color:var(--muted);margin-bottom:28px}
          .login-title{font-size:20px;font-weight:800;margin-bottom:20px}
          .form-group{margin-bottom:16px}
          label{display:block;font-size:13px;font-weight:600;color:#475569;margin-bottom:5px}
          input,textarea,select{width:100%;padding:11px 14px;border:1.5px solid var(--border);border-radius:8px;font-size:14px;font-family:inherit;color:var(--text);outline:none;transition:border-color .2s}
          input:focus,textarea:focus,select:focus{border-color:var(--blue)}
          .btn-login{width:100%;padding:13px;background:var(--blue);color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;transition:background .2s;margin-top:4px}
          .btn-login:hover{background:var(--blue-dark)}
          .btn-login:disabled{background:#93c5fd;cursor:not-allowed}
          .login-error{background:#fef2f2;color:#b91c1c;border:1px solid #fecaca;padding:10px 14px;border-radius:8px;font-size:13px;margin-bottom:16px;display:none}

          /* ADMIN LAYOUT */
          #admin-panel{display:none;flex-direction:column;min-height:100vh}
          .admin-topbar{background:var(--blue-dark);color:#fff;padding:0 28px;height:60px;display:flex;align-items:center;gap:16px;position:sticky;top:0;z-index:100}
          .admin-logo{font-size:20px;font-weight:900;letter-spacing:-0.5px}.admin-logo span{color:var(--gold)}
          .admin-badge{background:rgba(255,255,255,.15);font-size:11px;font-weight:700;padding:3px 10px;border-radius:99px;letter-spacing:.5px}
          .topbar-right{margin-left:auto;display:flex;align-items:center;gap:12px}
          .topbar-email{font-size:12px;color:rgba(255,255,255,.7)}
          .btn-signout{padding:7px 14px;background:rgba(255,255,255,.1);color:rgba(255,255,255,.8);border:1px solid rgba(255,255,255,.2);border-radius:7px;font-size:12px;cursor:pointer;font-family:inherit;transition:all .2s}
          .btn-signout:hover{background:rgba(255,255,255,.2);color:#fff}

          .admin-tabs{background:var(--white);border-bottom:2px solid var(--border);padding:0 28px;display:flex;gap:0;overflow-x:auto}
          .atab{padding:14px 18px;font-size:14px;font-weight:600;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px;transition:all .2s;display:flex;align-items:center;gap:6px;white-space:nowrap}
          .atab:hover{color:var(--text)}
          .atab.active{color:var(--blue);border-bottom-color:var(--blue)}

          .admin-body{padding:28px;flex:1}
          .page-section{display:none}.page-section.active{display:block}

          /* STATS */
          .stats-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:16px;margin-bottom:28px}
          .stat-card{background:var(--white);border-radius:14px;padding:22px;border:1px solid var(--border);display:flex;align-items:center;gap:16px}
          .stat-icon{font-size:28px;width:52px;height:52px;display:flex;align-items:center;justify-content:center;border-radius:12px;background:var(--blue-light);flex-shrink:0}
          .stat-val{font-size:28px;font-weight:900;color:var(--text);line-height:1}
          .stat-lbl{font-size:13px;color:var(--muted);margin-top:2px}

          /* TABLES */
          .table-wrap{background:var(--white);border-radius:16px;border:1px solid var(--border);overflow:hidden;margin-bottom:24px}
          .table-head{padding:16px 20px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);flex-wrap:wrap;gap:10px}
          .table-title{font-size:15px;font-weight:700}
          table{width:100%;border-collapse:collapse}
          th{font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;padding:12px 16px;text-align:left;border-bottom:1px solid var(--border);background:#fafafa}
          td{font-size:13px;padding:12px 16px;border-bottom:1px solid var(--border);color:var(--text);vertical-align:middle}
          tr:last-child td{border-bottom:none}
          tr:hover td{background:#fafafa}
          .btn{padding:6px 12px;border-radius:7px;font-size:12px;font-weight:600;cursor:pointer;border:none;font-family:inherit;transition:all .2s;display:inline-flex;align-items:center;gap:4px}
          .btn-approve{background:#dcfce7;color:#166534}.btn-approve:hover{background:#bbf7d0}
          .btn-unapprove{background:#fef9c3;color:#854d0e}.btn-unapprove:hover{background:#fef08a}
    </style></title>
  </head>
