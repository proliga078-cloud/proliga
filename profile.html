<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Perfil Profissional – Proliga</title>
  <meta name="description" content="Vê o perfil, serviços, portfólio e avaliações deste profissional no Porto ou Maia. Contacta diretamente pela Proliga."/>
  <meta name="robots" content="index, follow"/>
  <meta property="og:type" content="profile"/>
  <meta property="og:site_name" content="Proliga"/>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔧</text></svg>"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--blue:#1d4ed8;--blue-dark:#1e3a8a;--blue-light:#dbeafe;--gold:#f59e0b;--green:#16a34a;--text:#0f172a;--muted:#64748b;--border:#e2e8f0;--bg:#f8fafc;--white:#fff}
    body{font-family:'Inter',sans-serif;color:var(--text);background:var(--bg)}
    a{text-decoration:none;color:inherit}
    nav{position:sticky;top:0;z-index:200;background:var(--white);border-bottom:1px solid var(--border);padding:0 5%;height:68px;display:flex;align-items:center;gap:16px}
    .logo{font-size:22px;font-weight:900;color:var(--blue);letter-spacing:-1px}.logo span{color:var(--gold)}
    .btn{padding:8px 18px;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;border:none;transition:all .2s;font-family:inherit;display:inline-flex;align-items:center;gap:6px}
    .btn-ghost{background:transparent;color:var(--text)}.btn-ghost:hover{background:var(--bg)}
    .btn-outline{background:transparent;color:var(--blue);border:1.5px solid var(--blue)}.btn-outline:hover{background:var(--blue-light)}
    .btn-solid{background:var(--blue);color:#fff}.btn-solid:hover{background:var(--blue-dark)}
    .btn-gold{background:var(--gold);color:#fff}.btn-gold:hover{background:#d97706}
    .nav-right{display:flex;align-items:center;gap:8px;margin-left:auto}
    .nav-avatar{width:34px;height:34px;border-radius:50%;background:var(--blue);color:#fff;font-size:13px;font-weight:700;display:flex;align-items:center;justify-content:center;cursor:pointer}

    /* COVER */
    .cover{height:240px;background:linear-gradient(135deg,var(--blue-dark),var(--blue));background-size:cover;background-position:center;position:relative}
    .cover-overlay{position:absolute;inset:0;background:rgba(0,0,0,.15)}

    /* PROFILE LAYOUT */
    .profile-wrap{max-width:1100px;margin:0 auto;padding:0 24px}
    .profile-header{background:var(--white);border-radius:20px;margin-top:-60px;position:relative;z-index:2;padding:28px 32px 24px;box-shadow:0 4px 20px rgba(0,0,0,.08);display:flex;gap:24px;align-items:flex-start;flex-wrap:wrap}
    .avatar-wrap{flex-shrink:0;position:relative}
    .avatar{width:110px;height:110px;border-radius:50%;border:4px solid #fff;background:var(--blue);color:#fff;font-size:36px;font-weight:800;display:flex;align-items:center;justify-content:center;overflow:hidden;box-shadow:0 4px 12px rgba(0,0,0,.15)}
    .avatar img{width:100%;height:100%;object-fit:cover}
    .plan-badge-wrap{position:absolute;bottom:4px;right:-4px;font-size:10px;font-weight:700;padding:3px 8px;border-radius:99px}
    .badge-premium{background:var(--gold);color:#fff}
    .badge-pro{background:#7c3aed;color:#fff}
    .profile-info{flex:1;min-width:200px}
    .profile-name{font-size:26px;font-weight:800;letter-spacing:-0.5px;margin-bottom:8px;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
    .verif-badge{background:#dcfce7;color:var(--green);font-size:12px;font-weight:700;padding:3px 10px;border-radius:99px}
    .profile-cat{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:10px}
    .cat-pill{background:var(--blue-light);color:var(--blue);font-size:12px;font-weight:700;padding:4px 12px;border-radius:99px}
    .loc-text{font-size:14px;color:var(--muted)}
    .rating-row{display:flex;align-items:center;gap:8px;margin-bottom:12px}
    .stars{color:var(--gold);font-size:18px}
    .rating-score{font-size:18px;font-weight:700}
    .rating-count{font-size:13px;color:var(--muted)}
    .profile-bio{font-size:15px;color:#475569;line-height:1.7}
    .profile-stats{display:flex;gap:20px;flex-wrap:wrap;margin-top:14px;padding-top:14px;border-top:1px solid var(--bg)}
    .pstat{text-align:center;min-width:60px}
    .pstat strong{display:block;font-size:18px;font-weight:800;color:var(--text)}
    .pstat span{font-size:11px;color:var(--muted)}
    .profile-actions{display:flex;flex-direction:column;gap:8px;flex-shrink:0;min-width:160px}

    /* MAIN CONTENT */
    .content-grid{max-width:1100px;margin:24px auto;padding:0 24px;display:grid;grid-template-columns:1fr 320px;gap:24px}
    @media(max-width:900px){.content-grid{grid-template-columns:1fr}}
    @media(max-width:600px){
      .profile-wrap{padding:0 16px}
      .content-grid{padding:0 16px;margin:16px auto}
      .tabs{overflow-x:auto;white-space:nowrap;-webkit-overflow-scrolling:touch}
      .cover-photo{height:140px}
      nav{padding:0 4%}
    }

    /* TABS */
    .tabs{display:flex;gap:0;margin-bottom:24px;background:var(--white);border-radius:12px;padding:4px;border:1px solid var(--border)}
    .tab{flex:1;padding:10px;text-align:center;font-size:14px;font-weight:600;border-radius:9px;cursor:pointer;transition:all .2s;color:var(--muted)}
    .tab.active{background:var(--blue);color:#fff}

    /* CARDS */
    .card{background:var(--white);border-radius:16px;padding:24px;margin-bottom:20px;box-shadow:0 1px 4px rgba(0,0,0,.06)}
    .card-title{font-size:16px;font-weight:700;margin-bottom:16px;padding-bottom:12px;border-bottom:2px solid var(--bg)}

    /* PACKAGES (Fiverr-style) */
    .packages-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
    @media(max-width:600px){.packages-grid{grid-template-columns:1fr}}
    .package-card{border:2px solid var(--border);border-radius:14px;padding:18px;transition:all .2s;position:relative}
    .package-card.recommended{border-color:var(--blue);background:var(--blue-light)}
    .package-card h4{font-size:14px;font-weight:700;margin-bottom:4px;text-transform:uppercase;letter-spacing:.5px}
    .package-price{font-size:28px;font-weight:900;color:var(--blue);margin-bottom:8px}
    .package-price span{font-size:14px;font-weight:500;color:var(--muted)}
    .package-desc{font-size:13px;color:var(--muted);margin-bottom:12px;line-height:1.5}
    .package-features{list-style:none;margin-bottom:16px}
    .package-features li{font-size:13px;padding:4px 0;display:flex;align-items:center;gap:6px}
    .package-features li::before{content:'✓';color:var(--green);font-weight:700}
    .rec-badge{position:absolute;top:-10px;left:50%;transform:translateX(-50%);background:var(--blue);color:#fff;font-size:10px;font-weight:700;padding:2px 10px;border-radius:99px;white-space:nowrap}

    /* SERVICES */
    .service-item{padding:16px 0;border-bottom:1px solid var(--bg)}
    .service-item:last-child{border-bottom:none}
    .service-name{font-size:15px;font-weight:600;margin-bottom:4px}
    .service-desc{font-size:13px;color:var(--muted);line-height:1.5;margin-bottom:6px}
    .service-price{font-size:14px;font-weight:700;color:var(--blue)}

    /* PORTFOLIO */
    .portfolio-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px}
    .portfolio-img{aspect-ratio:1;border-radius:10px;overflow:hidden;cursor:pointer;position:relative}
    .portfolio-img img{width:100%;height:100%;object-fit:cover;transition:transform .3s}
    .portfolio-img:hover img{transform:scale(1.06)}
    .portfolio-img .cap{position:absolute;inset:0;background:rgba(0,0,0,.5);color:#fff;font-size:12px;padding:8px;display:none;align-items:flex-end}
    .portfolio-img:hover .cap{display:flex}

    /* REVIEWS */
    .review-item{padding:16px 0;border-bottom:1px solid var(--bg)}
    .review-item:last-child{border-bottom:none}
    .review-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px;flex-wrap:wrap;gap:6px}
    .review-name{font-size:14px;font-weight:700}
    .review-meta{font-size:12px;color:var(--muted)}
    .review-stars{color:var(--gold);font-size:14px}
    .review-text{font-size:14px;color:#475569;line-height:1.6}
    .review-form .form-group{margin-bottom:14px}
    label{display:block;font-size:13px;font-weight:600;color:#475569;margin-bottom:5px}
    input,select,textarea{width:100%;padding:10px 14px;border:1.5px solid var(--border);border-radius:8px;font-size:14px;font-family:inherit;color:var(--text);outline:none;transition:border-color .2s}
    input:focus,select:focus,textarea:focus{border-color:var(--blue)}
    textarea{resize:vertical;min-height:80px}
    .star-select{display:flex;gap:4px;margin-bottom:4px}
    .star-btn{font-size:24px;cursor:pointer;color:#e2e8f0;transition:color .15s;background:none;border:none}
    .star-btn.on{color:var(--gold)}
    .btn-submit{width:100%;padding:12px;background:var(--blue);color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;transition:background .2s}
    .btn-submit:hover{background:var(--blue-dark)}
    .btn-submit:disabled{background:#93c5fd;cursor:not-allowed}
    .msg{padding:10px 14px;border-radius:8px;font-size:13px;margin-bottom:10px;display:none}
    .msg.error{background:#fef2f2;color:#b91c1c;border:1px solid #fecaca}
    .msg.success{background:#f0fdf4;color:#166534;border:1px solid #bbf7d0}

    /* SIDEBAR */
    .contact-card{background:linear-gradient(135deg,var(--blue-dark),var(--blue));border-radius:16px;padding:24px;color:#fff;margin-bottom:16px}
    .contact-card h3{font-size:16px;font-weight:700;margin-bottom:16px}
    .contact-card input,.contact-card textarea{background:rgba(255,255,255,.12);border-color:rgba(255,255,255,.25);color:#fff}
    .contact-card input::placeholder,.contact-card textarea::placeholder{color:rgba(255,255,255,.5)}
    .contact-card label{color:rgba(255,255,255,.8)}
    .contact-card input:focus,.contact-card textarea:focus{border-color:rgba(255,255,255,.6)}
    .btn-contact{width:100%;padding:13px;background:var(--gold);color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;transition:background .2s;margin-top:4px}
    .btn-contact:hover{background:#d97706}
    .btn-contact:disabled{background:rgba(245,158,11,.5);cursor:not-allowed}
    .info-card{background:var(--white);border-radius:16px;padding:20px;margin-bottom:16px;border:1px solid var(--border)}
    .info-title{font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:12px}
    .info-row{display:flex;align-items:center;gap:10px;padding:8px 0;font-size:14px;border-bottom:1px solid var(--bg)}
    .info-row:last-child{border-bottom:none}
    .info-icon{font-size:18px;width:26px;text-align:center}

    /* LIGHTBOX */
    #lightbox{display:none;position:fixed;inset:0;background:rgba(0,0,0,.9);z-index:999;align-items:center;justify-content:center}
    #lightbox.open{display:flex}
    #lightbox img{max-width:90vw;max-height:85vh;border-radius:12px;object-fit:contain}
    #lb-cap{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);color:#fff;font-size:14px;background:rgba(0,0,0,.6);padding:8px 20px;border-radius:99px}
    #lb-close{position:fixed;top:20px;right:24px;font-size:32px;color:#fff;cursor:pointer;background:none;border:none;line-height:1}

    .loading{text-align:center;padding:40px;color:var(--muted)}
    .spinner{width:28px;height:28px;border:3px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto}
    @keyframes spin{to{transform:rotate(360deg)}}
  </style>
</head>
<body>

<nav>
  <a href="index.html" class="logo">Pro<span>liga</span></a>
  <nav style="display:flex;gap:8px;margin-left:auto;align-items:center;border:none;position:static;height:auto;padding:0;background:transparent">
    <a href="categoria.html" class="btn btn-ghost" style="font-size:13px">← Voltar</a>
    <div id="nav-guest" style="display:flex;gap:8px">
      <a href="auth.html?tab=login" class="btn btn-ghost">Entrar</a>
      <a href="auth.html?tab=register" class="btn btn-solid">Registar</a>
    </div>
    <div id="nav-user" style="display:none;align-items:center;gap:8px">
      <a href="dashboard.html" class="btn btn-outline">Dashboard</a>
      <div class="nav-avatar" id="nav-avatar" onclick="location.href='dashboard.html'">?</div>
    </div>
  </nav>
</nav>

<div id="cover" class="cover"><div class="cover-overlay"></div></div>

<div class="profile-wrap">
  <div id="profile-header" class="profile-header">
    <div class="loading"><div class="spinner"></div></div>
  </div>
</div>

<div class="content-grid" id="content-grid" style="display:none">
  <!-- LEFT -->
  <div>
    <div class="tabs">
      <div class="tab active" onclick="showTab('servicos')">🛠️ Serviços</div>
      <div class="tab" onclick="showTab('portfolio')">📸 Portfólio</div>
      <div class="tab" onclick="showTab('avaliacoes')">⭐ Avaliações</div>
    </div>

    <!-- SERVICES TAB -->
    <div id="tab-servicos">
      <div class="card" id="packages-card" style="display:none">
        <div class="card-title">📦 Pacotes de Serviço</div>
        <div class="packages-grid" id="packages-grid"></div>
      </div>
      <div class="card">
        <div class="card-title">🛠️ Serviços Oferecidos</div>
        <div id="services-list"><div class="loading"><div class="spinner"></div></div></div>
      </div>
    </div>

    <!-- PORTFOLIO TAB -->
    <div id="tab-portfolio" style="display:none">
      <div class="card">
        <div class="card-title">📸 Portfólio de Trabalhos</div>
        <div class="portfolio-grid" id="portfolio-grid">
          <div class="loading"><div class="spinner"></div></div>
        </div>
      </div>
    </div>

    <!-- REVIEWS TAB -->
    <div id="tab-avaliacoes" style="display:none">
      <div class="card">
        <div class="card-title" id="reviews-title">⭐ Avaliações</div>
        <div id="reviews-list"><div class="loading"><div class="spinner"></div></div></div>
      </div>
      <div class="card review-form">
        <div class="card-title">✍️ Deixar Avaliação</div>
        <div class="msg error" id="rev-error"></div>
        <div class="msg success" id="rev-success"></div>
        <div class="form-group"><label>O teu nome *</label><input id="rev-name" type="text" placeholder="João Silva"/></div>
        <div class="form-group"><label>Email *</label><input id="rev-email" type="email" placeholder="joao@email.com"/></div>
        <div class="form-group">
          <label>Classificação *</label>
          <div class="star-select">
            <button class="star-btn" data-v="1" onclick="setStar(1)">★</button>
            <button class="star-btn" data-v="2" onclick="setStar(2)">★</button>
            <button class="star-btn" data-v="3" onclick="setStar(3)">★</button>
            <button class="star-btn" data-v="4" onclick="setStar(4)">★</button>
            <button class="star-btn" data-v="5" onclick="setStar(5)">★</button>
          </div>
        </div>
        <div class="form-group"><label>Comentário (opcional)</label><textarea id="rev-comment" placeholder="Conta a tua experiência..."></textarea></div>
        <button class="btn-submit" id="rev-btn" onclick="submitReview()">Publicar avaliação</button>
      </div>
    </div>
  </div>

  <!-- SIDEBAR -->
  <div>
    <div class="contact-card">
      <h3>📩 Contactar Profissional</h3>
      <div class="msg error" id="msg-error"></div>
      <div class="msg success" id="msg-success"></div>
      <div class="form-group"><label>O teu nome *</label><input id="msg-name" type="text" placeholder="O teu nome"/></div>
      <div class="form-group"><label>Email *</label><input id="msg-email" type="email" placeholder="o-teu@email.com"/></div>
      <div class="form-group"><label>Telefone</label><input id="msg-phone" type="tel" placeholder="912 000 000"/></div>
      <div class="form-group"><label>Assunto *</label><input id="msg-subject" type="text" placeholder="Ex: Reparação urgente"/></div>
      <div class="form-group"><label>Mensagem *</label><textarea id="msg-content" placeholder="Descreve o que precisas..."></textarea></div>
      <button class="btn-contact" id="msg-btn" onclick="sendMessage()">Enviar mensagem</button>
    </div>

    <div class="info-card">
      <div class="info-title">Informações</div>
      <div id="info-items"></div>
    </div>

    <div class="info-card" id="plan-card" style="display:none">
      <div class="info-title">Plano</div>
      <div id="plan-info"></div>
    </div>

    <div class="info-card">
      <div class="info-title">Partilhar</div>
      <div style="display:flex;gap:8px">
        <button onclick="navigator.clipboard.writeText(location.href);showToast('Link copiado!')" class="btn btn-outline" style="flex:1;font-size:12px;padding:8px">📋 Copiar link</button>
        <a id="wa-share" href="#" target="_blank" class="btn btn-solid" style="flex:1;font-size:12px;padding:8px;justify-content:center">💬 WhatsApp</a>
      </div>
    </div>
  </div>
</div>

<!-- LIGHTBOX -->
<div id="lightbox" onclick="closeLightbox()">
  <button id="lb-close" onclick="closeLightbox()">✕</button>
  <img id="lb-img" src="" alt=""/>
  <div id="lb-cap"></div>
</div>

<!-- TOAST -->
<div id="toast" style="position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#0f172a;color:#fff;padding:10px 20px;border-radius:99px;font-size:14px;font-weight:600;display:none;z-index:9999"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL='https://cdwinidhtfxfxowflize.supabase.co'
const SUPABASE_KEY='sb_publishable_G1U9iSJLR2JkhD9gvfyY3Q_qaqnMaUk'
const db=supabase.createClient(SUPABASE_URL,SUPABASE_KEY)
const params=new URLSearchParams(location.search)
const proId=params.get('id')
let currentRating=0,proData=null

async function init(){
  if(!proId||proId==='null'||proId==='undefined'){location.href='index.html';return}
  const{data:{session}}=await db.auth.getSession()
  if(session){
    document.getElementById('nav-guest').style.display='none'
    const u=document.getElementById('nav-user');u.style.display='flex'
    const name=session.user.user_metadata?.name||session.user.email||'U'
    document.getElementById('nav-avatar').textContent=name.split(' ').map(n=>n[0]).slice(0,2).join('').toUpperCase()
  }
  const{data:pro,error}=await db.from('profiles').select('*').eq('id',proId).single()
  if(error||!pro){document.getElementById('profile-header').innerHTML='<p style="color:red;padding:20px">Profissional não encontrado.</p>';return}
  proData=pro
  document.title=`${pro.name} – Proliga`
  renderHeader(pro)
  document.getElementById('content-grid').style.display='grid'
  loadServices()
  loadReviews()
  loadPortfolio()
  renderSidebar(pro)
  // WA share
  document.getElementById('wa-share').href=`https://wa.me/?text=Confere%20o%20perfil%20de%20${encodeURIComponent(pro.name)}%20na%20Proliga%3A%20${encodeURIComponent(location.href)}`
}

function renderHeader(pro){
  const initials=pro.name.split(' ').map(n=>n[0]).slice(0,2).join('')
  const avatar=pro.photo_url?`<img src="${pro.photo_url}" alt="${pro.name}"/>`:`${initials}`
  if(pro.cover_url)document.getElementById('cover').style.backgroundImage=`url('${pro.cover_url}')`
  const planBadge=pro.plan==='premium'?`<span class="plan-badge-wrap badge-premium">👑 Premium</span>`:pro.plan==='pro'?`<span class="plan-badge-wrap badge-pro">🚀 Pro</span>`:''
  const verif=(pro.verified||pro.plan!=='free')?'<span class="verif-badge">✅ Verificado</span>':''
  document.getElementById('profile-header').innerHTML=`
    <div class="avatar-wrap"><div class="avatar">${avatar}</div>${planBadge}</div>
    <div class="profile-info">
      <div class="profile-name">${pro.name} ${verif}</div>
      <div class="profile-cat">
        <span class="cat-pill">${pro.category||'Profissional'}</span>
        <span class="loc-text">📍 ${pro.location||'Porto / Maia'}</span>
      </div>
      <div class="rating-row" id="rating-row">
        <div class="spinner" style="width:20px;height:20px;border-width:2px;margin:0"></div>
      </div>
      ${pro.bio?`<div class="profile-bio">${pro.bio}</div>`:''}
      <div class="profile-stats" id="profile-stats"></div>
    </div>
    <div class="profile-actions">
      ${pro.phone?`<a href="tel:${pro.phone}" class="btn btn-gold">📞 ${pro.phone}</a>`:''}
      ${pro.website?`<a href="${pro.website}" target="_blank" class="btn btn-outline">🌐 Website</a>`:''}
      <button class="btn btn-ghost" style="font-size:13px" onclick="showTab('avaliacoes');document.querySelector('#tab-avaliacoes').scrollIntoView({behavior:'smooth'})">✍️ Avaliar</button>
    </div>`
}

async function loadReviews(){
  const{data}=await db.from('reviews').select('*').eq('professional_id',proId).order('created_at',{ascending:false})
  const reviews=data||[]
  if(reviews.length>0){
    const avg=(reviews.reduce((s,r)=>s+r.rating,0)/reviews.length).toFixed(1)
    const n=Math.round(avg)
    document.getElementById('rating-row').innerHTML=`<span class="stars">${'★'.repeat(n)+'☆'.repeat(5-n)}</span><span class="rating-score">${avg}</span><span class="rating-count">(${reviews.length} avaliações)</span>`
  } else document.getElementById('rating-row').innerHTML=`<span style="font-size:14px;color:var(--muted)">Sem avaliações ainda</span>`

  document.getElementById('reviews-title').textContent=`⭐ Avaliações (${reviews.length})`

  // Stats
  const avgNum=reviews.length?(reviews.reduce((s,r)=>s+r.rating,0)/reviews.length).toFixed(1):0
  document.getElementById('profile-stats').innerHTML=`
    <div class="pstat"><strong>${avgNum||'—'}</strong><span>Avaliação</span></div>
    <div class="pstat"><strong>${reviews.length}</strong><span>Reviews</span></div>
    <div class="pstat"><strong>${proData.plan==='premium'?'Premium':proData.plan==='pro'?'Pro':'Grátis'}</strong><span>Plano</span></div>`

  if(!reviews.length){
    document.getElementById('reviews-list').innerHTML=`<p style="color:var(--muted);font-size:14px;text-align:center;padding:20px">Sem avaliações ainda. Sê o primeiro!</p>`
    return
  }
  document.getElementById('reviews-list').innerHTML=reviews.map(r=>{
    const stars='★'.repeat(r.rating)+'☆'.repeat(5-r.rating)
    const date=new Date(r.created_at).toLocaleDateString('pt-PT')
    return`<div class="review-item">
      <div class="review-header">
        <div><div class="review-name">${r.reviewer_name}</div><div class="review-stars">${stars}</div></div>
        <div class="review-meta">${date}</div>
      </div>
      ${r.comment?`<div class="review-text">${r.comment}</div>`:''}
    </div>`
  }).join('')
}

async function loadServices(){
  const{data}=await db.from('services').select('*').eq('professional_id',proId).order('created_at')
  if(!data||!data.length){
    document.getElementById('services-list').innerHTML=`<p style="color:var(--muted);font-size:14px;text-align:center;padding:20px">Nenhum serviço listado ainda.</p>`
    return
  }
  document.getElementById('services-list').innerHTML=data.map(s=>{
    const price=s.price_from?`<div class="service-price">A partir de €${s.price_from}${s.price_to?` – €${s.price_to}`:''} / ${s.price_unit||'hora'}</div>`:''
    return`<div class="service-item"><div class="service-name">${s.title}</div>${s.description?`<div class="service-desc">${s.description}</div>`:''}${price}</div>`
  }).join('')

  // Build packages from services
  if(data.length>=3){
    const basic=data[0],standard=data[Math.floor(data.length/2)],premium=data[data.length-1]
    document.getElementById('packages-card').style.display='block'
    document.getElementById('packages-grid').innerHTML=`
      <div class="package-card">
        <h4>Básico</h4>
        <div class="package-price">€${basic.price_from||'—'}<span>/hora</span></div>
        <div class="package-desc">${basic.description||basic.title}</div>
        <ul class="package-features"><li>${basic.title}</li></ul>
        <button class="btn btn-outline" style="width:100%" onclick="document.getElementById('msg-subject').value='Plano Básico – ${basic.title}';document.querySelector('.contact-card').scrollIntoView({behavior:'smooth'})">Contratar</button>
      </div>
      <div class="package-card recommended">
        <div class="rec-badge">⭐ Mais Popular</div>
        <h4>Standard</h4>
        <div class="package-price">€${standard.price_from||'—'}<span>/hora</span></div>
        <div class="package-desc">${standard.description||standard.title}</div>
        <ul class="package-features"><li>${basic.title}</li><li>${standard.title}</li></ul>
        <button class="btn btn-solid" style="width:100%" onclick="document.getElementById('msg-subject').value='Plano Standard – ${standard.title}';document.querySelector('.contact-card').scrollIntoView({behavior:'smooth'})">Contratar</button>
      </div>
      <div class="package-card">
        <h4>Premium</h4>
        <div class="package-price">€${premium.price_from||'—'}<span>/hora</span></div>
        <div class="package-desc">${premium.description||premium.title}</div>
        <ul class="package-features"><li>${basic.title}</li><li>${standard.title}</li><li>${premium.title}</li></ul>
        <button class="btn btn-gold" style="width:100%" onclick="document.getElementById('msg-subject').value='Plano Premium – ${premium.title}';document.querySelector('.contact-card').scrollIntoView({behavior:'smooth'})">Contratar</button>
      </div>`
  }
}

async function loadPortfolio(){
  const{data}=await db.from('portfolio_items').select('*').eq('professional_id',proId).order('created_at',{ascending:false})
  const grid=document.getElementById('portfolio-grid')
  if(!data||!data.length){grid.innerHTML=`<p style="color:var(--muted);font-size:14px;padding:20px">Sem fotos de portfólio ainda.</p>`;return}
  grid.innerHTML=data.map(item=>`
    <div class="portfolio-img" onclick="openLightbox('${item.photo_url}','${(item.caption||'').replace(/'/g,'&apos;')}')">
      <img src="${item.photo_url}" alt="${item.caption||'Trabalho'}" loading="lazy"/>
      <div class="cap">${item.caption||''}</div>
    </div>`).join('')
}

function renderSidebar(pro){
  const items=[]
  if(pro.location)items.push(`<div class="info-row"><span class="info-icon">📍</span>${pro.location}</div>`)
  if(pro.phone)items.push(`<div class="info-row"><span class="info-icon">📞</span><a href="tel:${pro.phone}" style="color:var(--blue)">${pro.phone}</a></div>`)
  if(pro.website)items.push(`<div class="info-row"><span class="info-icon">🌐</span><a href="${pro.website}" target="_blank" style="color:var(--blue)">Website</a></div>`)
  const joined=new Date(pro.created_at).toLocaleDateString('pt-PT',{month:'long',year:'numeric'})
  items.push(`<div class="info-row"><span class="info-icon">📅</span>Membro desde ${joined}</div>`)
  document.getElementById('info-items').innerHTML=items.join('')
  if(pro.plan&&pro.plan!=='free'){
    document.getElementById('plan-card').style.display='block'
    const icon=pro.plan==='premium'?'👑':'🚀',label=pro.plan==='premium'?'Premium':'Pro',color=pro.plan==='premium'?'var(--gold)':'#7c3aed'
    document.getElementById('plan-info').innerHTML=`<div style="display:flex;align-items:center;gap:10px;padding:8px;background:${color}22;border-radius:10px"><span style="font-size:24px">${icon}</span><div><div style="font-weight:700;color:${color}">${label}</div><div style="font-size:12px;color:var(--muted)">Profissional verificado</div></div></div>`
  }
}

function showTab(name){
  document.querySelectorAll('.tab').forEach((t,i)=>{
    const names=['servicos','portfolio','avaliacoes']
    t.classList.toggle('active',names[i]===name)
  })
  document.getElementById('tab-servicos').style.display=name==='servicos'?'block':'none'
  document.getElementById('tab-portfolio').style.display=name==='portfolio'?'block':'none'
  document.getElementById('tab-avaliacoes').style.display=name==='avaliacoes'?'block':'none'
}

function setStar(v){
  currentRating=v
  document.querySelectorAll('.star-btn').forEach(b=>b.classList.toggle('on',parseInt(b.dataset.v)<=v))
}

async function submitReview(){
  const name=document.getElementById('rev-name').value.trim()
  const email=document.getElementById('rev-email').value.trim()
  const comment=document.getElementById('rev-comment').value.trim()
  const btn=document.getElementById('rev-btn')
  if(!name||!email)return showMsg('rev-error','Preenche nome e email.')
  if(!currentRating)return showMsg('rev-error','Escolhe uma classificação.')
  btn.disabled=true;btn.textContent='A publicar...'
  const{error}=await db.from('reviews').insert({professional_id:proId,reviewer_name:name,reviewer_email:email,rating:currentRating,comment})
  if(error){showMsg('rev-error','Erro ao publicar. Tenta de novo.');btn.disabled=false;btn.textContent='Publicar avaliação';return}
  showMsg('rev-success','Avaliação publicada! Obrigado.','success')
  document.getElementById('rev-name').value='';document.getElementById('rev-email').value='';document.getElementById('rev-comment').value='';setStar(0)
  btn.disabled=false;btn.textContent='Publicar avaliação'
  setTimeout(loadReviews,800)
}

async function sendMessage(){
  const name=document.getElementById('msg-name').value.trim()
  const email=document.getElementById('msg-email').value.trim()
  const phone=document.getElementById('msg-phone').value.trim()
  const subject=document.getElementById('msg-subject').value.trim()
  const content=document.getElementById('msg-content').value.trim()
  const btn=document.getElementById('msg-btn')
  if(!name||!email||!subject||!content)return showMsg('msg-error','Preenche todos os campos obrigatórios.')
  btn.disabled=true;btn.textContent='A enviar...'
  const{error}=await db.from('messages').insert({professional_id:proId,sender_name:name,sender_email:email,sender_phone:phone,subject,content})
  if(error){showMsg('msg-error','Erro ao enviar. Tenta de novo.');btn.disabled=false;btn.textContent='Enviar mensagem';return}
  showMsg('msg-success','Mensagem enviada com sucesso! O profissional irá contactar-te em breve.','success')
  ;['msg-name','msg-email','msg-phone','msg-subject','msg-content'].forEach(id=>document.getElementById(id).value='')
  btn.disabled=false;btn.textContent='Enviar mensagem'
}

function showMsg(id,txt,type='error'){
  const el=document.getElementById(id);el.textContent=txt;el.className=`msg ${type}`;el.style.display='block'
  if(type==='success')setTimeout(()=>el.style.display='none',5000)
}

function openLightbox(src,cap){
  document.getElementById('lb-img').src=src
  document.getElementById('lb-cap').textContent=cap
  document.getElementById('lightbox').classList.add('open')
  document.body.style.overflow='hidden'
}
function closeLightbox(){document.getElementById('lightbox').classList.remove('open');document.body.style.overflow=''}
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeLightbox()})

function showToast(msg){
  const t=document.getElementById('toast');t.textContent=msg;t.style.display='block'
  setTimeout(()=>t.style.display='none',2500)
}

init()
</script>
</body>
</html>
